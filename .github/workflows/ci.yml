name: CI/CD Quality Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Execute Linter
        run: npm run lint

      - name: Execute Unit Tests
        run: npx vitest run

      - name: Compile Production Build
        run: npm run build
        env:
          # Ensure dummy variables exist during the build step if they are statically analyzed
          RESEND_API_KEY: "dummy_ci_key"
          VITE_SUPABASE_URL: "https://dummy.supabase.co"
          VITE_SUPABASE_ANON_KEY: "dummy_anon_key"
